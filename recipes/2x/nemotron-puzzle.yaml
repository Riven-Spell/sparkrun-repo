model: nvidia/NVIDIA-Nemotron-Labs-3-Puzzle-75B-A9B-FP8
container: vllm-nemotron-puzzle-runtime
builder: eugr
min_nodes: 2
recipe_version: '2'
runtime_config:
  build_args: [ '--vllm-ref', 'v0.25.0' ]

mods:
  - fastokens

defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 2
  pipeline_parallel: 1
  gpu_memory_utilization: 0.85
  max_model_len: 250000
  max_num_batched_tokens: 16384
  max_num_seqs: 10
  block_size: 256
  max_cudagraph_capture_size: 16
  kv_cache_dtype: auto
  tool_call_parser: qwen3_coder
  reasoning_parser: nemotron_v3
  tokenizer_mode: auto
  load_format: instanttensor
  attn_backend: flashinfer
  speculative_config: '{"method":"mtp","num_speculative_tokens":5}'
  compilation_config: '{"cudagraph_mode":"FULL_AND_PIECEWISE","custom_ops":["all"]}'
  default_chat_template_kwargs: '{"enable_thinking": true, "preserve_thinking": true}'
command: |
  vllm serve {model} \
    --served-model-name 'nvidia/NVIDIA-Nemotron-Labs-3-Puzzle-75B-A9B' \
    --host {host} \
    --port {port} \
    -tp {tensor_parallel} \
    -pp {pipeline_parallel} \
    --max-model-len {max_model_len} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --max-num-seqs {max_num_seqs} \
    --kv-cache-dtype {kv_cache_dtype} \
    --trust-remote-code \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --enable-auto-tool-choice \
    --tool-call-parser {tool_call_parser} \
    --tokenizer-mode {tokenizer_mode} \
    --reasoning-parser {reasoning_parser} \
    --kv-cache-dtype {kv_cache_dtype} \
    --load-format {load_format} \
    --max-cudagraph-capture-size {max_cudagraph_capture_size} \
    --speculative-config '{speculative_config}' \
    --compilation-config '{compilation_config}' \
    --enable-prefix-caching \
    --default-chat-template-kwargs '{default_chat_template_kwargs}' \
    --block-size {block_size} \
    --generation-config vllm \
    --attention-backend '{attn_backend}' \
    -ep
env:
  INSTANTTENSOR_CHUNK_SIZE: "16777216"
  INSTANTTENSOR_IO_DEPTH: 5
  PYTORCH_CUDA_ALLOC_CONF: 'expandable_segments:True,max_non_split_rounding_mb:2048,graph_capture_record_stream_reuse:True,pinned_use_background_threads:True,pinned_use_cuda_host_register:True'
  VLLM_MARLIN_USE_ATOMIC_ADD: "1"
  DG_JIT_USE_NVRTC: "0"
  TILELANG_CLEANUP_TEMP_FILES: "1"
  VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS: "0"
  VLLM_SKIP_INIT_MEMORY_CHECK: "1"
  VLLM_USE_FASTOKENS: "1"
  VLLM_FLASHINFER_DECODE_USE_TENSOR_CORES: "1"