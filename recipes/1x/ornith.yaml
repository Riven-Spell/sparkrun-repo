name: Ornith-1.0-35B
solo_only: false
cluster_only: false
command: |
  vllm serve {model} \
    --served-model-name Ornith-1.0-35B \
    --tensor-parallel-size {tensor_parallel} \
    --host {host} --port {port} \
    --max-model-len {max_model_len} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --max-num-seqs {max_num_seqs} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --enable-prefix-caching \
    --enable-auto-tool-choice --tool-call-parser qwen3_xml \
    --reasoning-parser qwen3 \
    --trust-remote-code \
    --load-format {load_format} \
    --attention-backend {attn_backend} \
    --enable-chunked-prefill \
    --enable-flashinfer-autotune \
    --kv-cache-dtype {kv_cache_dtype} \
    -ep
defaults:
  kv_cache_dtype: auto
  attn_backend: FLASH_ATTN
  load_format: instanttensor
  tensor_parallel: 1
  max_model_len: 262144
  max_num_seqs: 10
  port: 8000
  max_num_batched_tokens: 32768
  host: 0.0.0.0
  gpu_memory_utilization: 0.85
env:
  INSTANTTENSOR_CHUNK_SIZE: "16777216"
  INSTANTTENSOR_IO_DEPTH: 5
  PYTORCH_CUDA_ALLOC_CONF: 'expandable_segments:True,max_non_split_rounding_mb:2048,graph_capture_record_stream_reuse:True,pinned_use_background_threads:True,pinned_use_cuda_host_register:True'
  VLLM_MARLIN_USE_ATOMIC_ADD: "1"
  VLLM_USE_FASTOKENS: "1"
mods:
  - fastokens
description: Ornith-1.0-35B
container: vllm-node-tf5
model: deepreinforce-ai/Ornith-1.0-35B
recipe_version: '2'
builder: eugr