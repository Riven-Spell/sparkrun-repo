metadata:
  num_layers: 30
  quantization: modelopt
  description: Gemma4-31B-it-NVFP4-turbo
  model_dtype: nvfp4
  quant_bits: 4
  kv_dtype: fp8
  num_kv_heads: 8
  head_dim: 256
  model_params: '34372770104'
model: LilaRest/gemma-4-31B-it-NVFP4-turbo
command: |
  vllm serve {model} \
    --quantization modelopt \
    --max-model-len {max_model_len} \
    --kv-cache-dtype {kv_cache_dtype} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --host {host} \
    --port {port} \
    --load-format {load_format} \
    --enable-prefix-caching \
    --tool-call-parser {tool_call_parser} \
    --enable-auto-tool-choice \
    --reasoning-parser {reasoning_parser} \
    --async-scheduling \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --max-num-seqs {max_num_seqs} \
    -tp {tensor_parallel} \
    -pp {pipeline_parallel} \
    --default-chat-template-kwargs '{"enable_thinking": true}' \
    --chat-template chat_template.jinja \
    --trust-remote-code \
    --speculative-config '{"method": "dflash", "model":"RedHatAI/gemma-4-31B-it-speculator.dflash", "num_speculative_tokens": 12}'
runtime: vllm
container: sparkrun-eugr-vllm-tf5
recipe_version: '2'
runtime_config:
  build_args: [--apply-vllm-pr 45544]
defaults:
  host: 0.0.0.0
  tool_call_parser: gemma4
  port: 8000
  pipeline_parallel: 1
  load_format: instanttensor
  reasoning_parser: gemma4
  kv_cache_dtype: fp8
  gpu_memory_utilization: 0.8
  tensor_parallel: 1
  max_num_batched_tokens: 8192
  max_model_len: 262144
  max_num_seqs: 10
env:
  VLLM_MARLIN_USE_ATOMIC_ADD: '1'
mods:
  - mods/fix-gemma4-tool-parser
  - mods/gemma4-jinja
  - mods/fix-gemma4-modelopt
  - mods/fix-gemma4-mtp
