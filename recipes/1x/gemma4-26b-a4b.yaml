metadata:
  num_layers: 30
  quantization: modelopt
  description: Gemma4-26B-A4B-it (DSpark speculative decoding)
  model_dtype: nvfp4
  quant_bits: 4
  kv_dtype: auto
  num_kv_heads: 8
  head_dim: 256
  model_params: '34372770104'
model: unsloth/gemma-4-26B-A4B-it-NVFP4
command: |
  vllm serve {model} \
    --served-model-name "google/gemma-4-26B-A4B-it" \
    --max-model-len {max_model_len} \
    --kv-cache-dtype {kv_cache_dtype} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --host {host} \
    --port {port} \
    --load-format {load_format} \
    --enable-prefix-caching \
    --tool-call-parser {tool_call_parser} \
    --enable-auto-tool-choice \
    --reasoning-parser {reasoning_parser} \
    --async-scheduling \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --max-num-seqs {max_num_seqs} \
    -tp {tensor_parallel} \
    -pp {pipeline_parallel} \
    --attention-backend {attn_backend} \
    --default-chat-template-kwargs '{chat_template_args}' \
    --chat-template chat_template.jinja \
     --trust-remote-code \
    --enable-chunked-prefill \
    --block-size {block_size} \
    --max-cudagraph-capture-size {max_cudagraph_capture_size} \
    --enable-flashinfer-autotune \
    --speculative-config '{speculative_config}' \
    --compilation-config '{compilation_config}' \
    -ep \
    -O3
runtime: vllm
container: eugr-gemma4-025-main
recipe_version: '2'
builder: eugr
runtime_config:
  build_args: [ '--vllm-ref', '2f75e7f712fb2a013ce05ff357d94135231c8ae2', '--flashinfer-ref', '6104afe3777bcfb16a71fa28eb73b51b7e5e5332' ]
defaults:
  host: 0.0.0.0
  tool_call_parser: gemma4
  port: 8000
  pipeline_parallel: 1
  load_format: instanttensor
  reasoning_parser: gemma4
  kv_cache_dtype: auto
  gpu_memory_utilization: 0.8
  tensor_parallel: 1
  max_num_batched_tokens: 32768
  max_model_len: 262144
  max_num_seqs: 10
  max_cudagraph_capture_size: 8
  block_size: 256
  attn_backend: TRITON_ATTN
  chat_template_args: '{"enable_thinking": true}'
  speculative_config: '{"method": "dspark", "num_speculative_tokens": 6, "model": "makora-ai/gemma4-26b-a4b-dspark"}'
  compilation_config: '{"cudagraph_mode":"FULL_AND_PIECEWISE","custom_ops":["all"]}'
env:
  PYTORCH_CUDA_ALLOC_CONF: 'expandable_segments:True'
  VLLM_SKIP_INIT_MEMORY_CHECK: "1"
  VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS: "0"
  VLLM_MARLIN_USE_ATOMIC_ADD: '1'
  #VLLM_USE_FASTOKENS: '1'
  VLLM_FLASHINFER_DECODE_USE_TENSOR_CORES: '1'
  VLLM_USE_V2_MODEL_RUNNER: '1'
  VLLM_USE_FLASHINFER_SAMPLER: '0'
  VLLM_DSPARK_CONFIDENCE_THRESHOLD: "0.0"
  VLLM_DSPARK_CONFIDENCE_SCHEDULER: "off"
  VLLM_DSPARK_LOCAL_ARGMAX: "1"
  VLLM_DSPARK_REPLICATE_MARKOV_W1: "1"
  VLLM_DSPARK_FUSED_MARKOV_ARGMAX: "0"
  VLLM_DSPARK_GPU_REJECTED_CONTEXT_MASK: "1"
  VLLM_DSPARK_REFERENCE_KV_QUANT_DEQUANT: "0"
  VLLM_DSPARK_HARDWARE_SCHEDULER_EARLY_STOP: "1"
  TILELANG_CLEANUP_TEMP_FILES: "1"
  TORCH_CUDA_ARCH_LIST: '12.1a'
  FLASHINFER_CUDA_ARCH_LIST: '12.1a'
mods:
  - mods/vllm-pr-48624-fp4-moe-pad
  - mods/vllm-pr-40898-forward
  - mods/fix-gemma4-tool-parser
  - mods/gemma4-jinja
  #- mods/fix-gemma4-mtp
  #- fastokens
